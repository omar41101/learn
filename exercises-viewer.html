<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise Viewer - من الملف</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Tajawal', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            padding: 30px;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            color: #999;
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.9em;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        select, button {
            padding: 10px 20px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
            background: white;
            color: #333;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #5568d3;
        }
        
        .checkbox-group {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        
        .exercise-list {
            display: grid;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .exercise-item {
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            background: #f9f9f9;
        }
        
        .exercise-item:hover {
            background: #f0f0f0;
            border-color: #667eea;
            transform: translateX(-5px);
        }
        
        .exercise-item.active {
            background: #e8eaf6;
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }
        
        .exercise-title {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        
        .exercise-meta {
            font-size: 0.85em;
            color: #999;
            display: flex;
            gap: 15px;
        }
        
        .exercise-details {
            margin-top: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
            border-right: 4px solid #667eea;
        }
        
        .exercise-details h2 {
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .detail-group {
            margin-bottom: 15px;
        }
        
        .detail-label {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .detail-value {
            color: #333;
            line-height: 1.6;
            padding: 10px;
            background: white;
            border-radius: 4px;
            margin-bottom: 5px;
        }
        
        .data-preview {
            background: white;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 0.9em;
            border: 1px solid #ddd;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }
        
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 6px;
            border-left: 4px solid #c33;
            margin-bottom: 20px;
        }
        
        .success {
            background: #efe;
            color: #3c3;
            padding: 15px;
            border-radius: 6px;
            border-left: 4px solid #3c3;
            margin-bottom: 20px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        pre {
            background: white;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 0.85em;
            line-height: 1.4;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            background: #667eea;
            color: white;
            border-radius: 20px;
            font-size: 0.85em;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 عارض التمارين</h1>
        <p class="subtitle">تحميل التمارين من ملف exercises.json</p>
        
        <div id="error-container"></div>
        
        <div class="controls">
            <div class="checkbox-group">
                <label>
                    <input type="checkbox" id="showDiagnosis" checked>
                    تمارين التشخيص
                </label>
                <label>
                    <input type="checkbox" id="showLevels" checked>
                    تمارين المستويات
                </label>
            </div>
            <select id="levelFilter">
                <option value="">جميع المستويات</option>
                <option value="1">المستوى 1</option>
                <option value="2">المستوى 2</option>
                <option value="3">المستوى 3</option>
                <option value="4">المستوى 4</option>
            </select>
            <button onclick="loadExercises()">تحميل التمارين</button>
        </div>
        
        <div id="exercises-container">
            <div class="loading">جاري التحميل...</div>
        </div>
        
        <div id="details-container"></div>
    </div>
    
    <script>
        let allExercises = { diagnosis: [], levels: [] };
        
        async function loadExercises() {
            const container = document.getElementById('exercises-container');
            const errorContainer = document.getElementById('error-container');
            errorContainer.innerHTML = '';
            container.innerHTML = '<div class="loading">جاري التحميل...</div>';
            
            try {
                // Load from API endpoint (which reads exercises.json)
                const response = await fetch('/api/exercises/level/1');
                
                if (!response.ok) {
                    throw new Error(`خطأ في التحميل: ${response.status}`);
                }
                
                // For demo, we'll load all exercises by calling the API
                // In production, you might want an endpoint to get all exercises
                const allExercisesResponse = await fetch('/exercises.json');
                allExercises = await allExercisesResponse.json();
                
                displayExercises();
            } catch (error) {
                console.error('Error loading exercises:', error);
                errorContainer.innerHTML = `<div class="error">❌ خطأ: ${error.message}</div>`;
                container.innerHTML = '<div class="empty-state">لم يتم التحميل بنجاح</div>';
            }
        }
        
        function displayExercises() {
            const container = document.getElementById('exercises-container');
            const levelFilter = document.getElementById('levelFilter').value;
            const showDiagnosis = document.getElementById('showDiagnosis').checked;
            const showLevels = document.getElementById('showLevels').checked;
            
            let exercises = [];
            
            if (showDiagnosis) {
                exercises = exercises.concat(allExercises.diagnosis);
            }
            if (showLevels) {
                exercises = exercises.concat(allExercises.levels);
            }
            
            if (levelFilter) {
                exercises = exercises.filter(ex => ex.level_id === parseInt(levelFilter));
            }
            
            if (exercises.length === 0) {
                container.innerHTML = '<div class="empty-state">لا توجد تمارين بهذه المعايير</div>';
                return;
            }
            
            const html = exercises.map((ex, index) => `
                <div class="exercise-item" onclick="showDetails(${index}, ${ex.id})">
                    <div class="exercise-title">${ex.title}</div>
                    <div class="exercise-meta">
                        <span>📌 رقم التمرين: ${ex.id}</span>
                        <span>📊 المستوى: ${ex.level_id}</span>
                        <span class="badge">${ex.exercise_type}</span>
                    </div>
                </div>
            `).join('');
            
            container.innerHTML = html;
        }
        
        function showDetails(index, exerciseId) {
            const allExercisesList = [...allExercises.diagnosis, ...allExercises.levels];
            const exercise = allExercisesList.find(ex => ex.id === exerciseId);
            
            if (!exercise) return;
            
            const detailsContainer = document.getElementById('details-container');
            
            const html = `
                <div class="exercise-details">
                    <h2>${exercise.title}</h2>
                    
                    <div class="detail-group">
                        <div class="detail-label">رقم التمرين</div>
                        <div class="detail-value">${exercise.id}</div>
                    </div>
                    
                    <div class="detail-group">
                        <div class="detail-label">المستوى</div>
                        <div class="detail-value">${exercise.level_id}</div>
                    </div>
                    
                    <div class="detail-group">
                        <div class="detail-label">نوع التمرين</div>
                        <div class="detail-value"><span class="badge">${exercise.exercise_type}</span></div>
                    </div>
                    
                    <div class="detail-group">
                        <div class="detail-label">السؤال</div>
                        <div class="detail-value">${exercise.question_text}</div>
                    </div>
                    
                    <div class="detail-group">
                        <div class="detail-label">التلميح</div>
                        <div class="detail-value">${exercise.hint || 'بدون تلميح'}</div>
                    </div>
                    
                    <div class="detail-group">
                        <div class="detail-label">بيانات التمرين (JSON)</div>
                        <pre class="data-preview">${JSON.stringify(exercise.data, null, 2)}</pre>
                    </div>
                </div>
            `;
            
            detailsContainer.innerHTML = html;
            detailsContainer.scrollIntoView({ behavior: 'smooth' });
        }
        
        // Add event listeners
        document.getElementById('showDiagnosis').addEventListener('change', displayExercises);
        document.getElementById('showLevels').addEventListener('change', displayExercises);
        document.getElementById('levelFilter').addEventListener('change', displayExercises);
        
        // Load exercises on page load
        loadExercises();
    </script>
</body>
</html>
