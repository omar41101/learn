<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التشخيص - منصة التعلم</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Minimal layout helpers for diagnosis */
        .diagnosis-page { padding: 2rem 0; }
    </style>
</head>
<body class="diagnosis-page">
    <div class="container" style="min-height: auto; padding-top: 2rem;">
        <div id="toast" class="toast"></div>

        <header class="student-header">
            <div class="student-info">
                <div class="avatar"><i class="fas fa-stethoscope"></i></div>
                <div>
                    <h2 id="studentName">تشخيص مستوى الطالب</h2>
                    <span class="badge">بيانات أولية</span>
                </div>
            </div>
            <button class="back-btn" onclick="handleLogout()">
                خروج <i class="fas fa-sign-out-alt"></i>
            </button>
        </header>

        <main class="welcome-screen" style="max-width: 700px; margin: 0 auto; text-align: center; padding: 2.5rem;">
            <h2>مرحباً بك في منصتنا 👋</h2>
            <p style="margin-top: 1rem; font-size: 1.2rem;">جاري تحضير أسئلة التشخيص لك...</p>
            <div style="margin-top: 2rem;">
                <i class="fas fa-spinner fa-spin" style="font-size: 3rem; color: #6366f1;"></i>
            </div>
        </main>
    </div>

    <script>
        function goHome() {
            window.location.href = 'index.html';
        }

        function handleLogout() {
            localStorage.removeItem('userRole');
            localStorage.removeItem('userId');
            localStorage.removeItem('fullName');
            localStorage.removeItem('diagnosisPassed');
            window.location.href = 'index.html';
        }

        function startDiagnosis(level) {
                // ضع علامة في localStorage تفيد بأن المستخدم مرّ بصفحة التشخيص
                try {
                    localStorage.setItem('diagnosisPassed', 'true');
                } catch (e) {
                    console.warn('localStorage غير متاح:', e);
                }
                // نمرر باراميتر diagnosis لتعرف الصفحة أنها وضع تشخيص
                window.location.href = `exercise.html?level=${level}&diagnosis=true`;
        }

        document.addEventListener('DOMContentLoaded', function() {
            const fullName = localStorage.getItem('fullName') || 'طالب';
            const studentNameEl = document.getElementById('studentName');
            if (studentNameEl) {
                studentNameEl.textContent = `تشخيص مستوى: ${fullName}`;
            }

            // تخطي النموذج والانتقال مباشرة للتمارين
            setTimeout(() => {
                startDiagnosis(1);
            }, 1000);
        });
    </script>
</body>
</html>
