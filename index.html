<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة التعلم التفاعلي</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Only Keep Page-Specific Logic Styles if any */
        #mainPageContent { display: none; } /* Controlled by JS */

        /* Auth Modal Styles */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease-out;
        }

        .auth-card {
            background: rgba(30, 41, 59, 0.95);
            padding: 3rem;
            border-radius: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%;
            max-width: 450px;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .auth-card h2 {
            margin-bottom: 2rem;
            text-align: center;
            color: #fff;
            font-size: 1.75rem;
        }

        .auth-card .form-group {
            margin-bottom: 1.5rem;
        }

        .auth-card label {
            display: block;
            margin-bottom: 0.5rem;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .auth-card input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            color: #fff;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .auth-card input:focus {
            outline: none;
            border-color: #6366f1;
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .auth-links {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .auth-links a {
            color: #6366f1;
            text-decoration: none;
            font-weight: 600;
        }

        .message-box {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 0.75rem;
            display: none;
            text-align: center;
            font-weight: 600;
        }

        .message-box.success { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .message-box.error { background: rgba(239, 68, 68, 0.1); color: #ef4444; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>
    <div class="container">
        <div id="mainPageContent">
            <div class="welcome-screen">
                <!-- الشعار -->
                <div class="logo">
                    <i class="fas fa-graduation-cap"></i>
                    <h1>منصة التعلم التفاعلي</h1>
                    <p class="tagline">التعلم باللعب والمتعة</p>
                </div>
                
                <!-- الشخصية المتحركة -->
                <div class="character">
                    <div class="char-head">
                        <div class="char-eye left"></div>
                        <div class="char-eye right"></div>
                        <div class="char-smile"></div>
                    </div>
                </div>
                
                <!-- الرسالة الترحيبية -->
                <div class="welcome-message">
                    <h2>مرحباً في عالم التعلم الممتع!</h2>
                    <p>هيا نبدأ رحلة التعلم مع المستويات الأربعة الممتعة!</p>
                    <p>تعلم عن الحيوانات، الحواس، ودورة الماء بطريقة تفاعلية!</p>
                </div>
                
                <!-- أزرار الاختيار -->
                <div class="action-buttons">
                    <button class="btn student-btn" onclick="enterAsStudent()">
                        <i class="fas fa-user-graduate"></i>
                        <div>
                            <span>أنا طالب</span>
                            <small>ابدأ التعلم واللعب</small>
                        </div>
                    </button>

                    <button class="btn teacher-btn" onclick="enterAsTeacher()">
                        <i class="fas fa-chalkboard-teacher"></i>
                        <div>
                            <span>أنا معلم</span>
                            <small>إدارة التمارين والنتائج</small>
                        </div>
                    </button>

                    <button class="btn" onclick="showRegisterModal()" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: #fff; width: 100%; margin-top: 0.5rem;">
                        <i class="fas fa-user-plus"></i>
                        <div>
                            <span>إنشاء حساب جديد</span>
                            <small>سجّل كطالب أو معلم</small>
                        </div>
                    </button>
                </div>
                
                <!-- التذييل -->
                <footer class="footer">
                    <p>منصة تعليمية تفاعلية - النسخة التجريبية</p>
                    <p class="note">⚠️ ملاحظة: التقدم غير محفوظ في هذه النسخة</p>
                </footer>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // On page load, check user role
        document.addEventListener('DOMContentLoaded', function() {
            const userRole = localStorage.getItem('userRole');
            if (userRole === 'teacher') {
                window.location.href = 'teacher.html';
                return;
            } else if (userRole === 'student') {
                window.location.href = 'student.html';
                return;
            }
            // If not logged in, show guest view (main page)
            document.getElementById('mainPageContent').style.display = 'block';
            // Character animation
            const head = document.querySelector('.char-head');
            if (head) {
                setInterval(() => {
                    head.style.transform = 'rotate(5deg)';
                    setTimeout(() => {
                        head.style.transform = 'rotate(-5deg)';
                    }, 500);
                }, 1000);
            }
        });

        function showRegisterModal() {
            if (document.getElementById('registerModal')) return;
            const modal = document.createElement('div');
            modal.id = 'registerModal';
            modal.innerHTML = `
                <div class="modal-overlay">
                    <div class="auth-card">
                        <button onclick="document.getElementById('registerModal').remove()" style="position:absolute;left:16px;top:16px;background:none;border:none;font-size:1.5rem;cursor:pointer;color:#fff">&times;</button>
                        <h2><i class='fas fa-user-plus'></i> إنشاء حساب جديد</h2>
                        <form id="modalRegisterForm">
                            <div class="form-group">
                                <label>الاسم الكامل</label>
                                <input type="text" id="reg-fullname" required placeholder="أدخل اسمك الكامل">
                            </div>
                            <div class="form-group">
                                <label>اسم المستخدم</label>
                                <input type="text" id="reg-username" required placeholder="اختر اسم مستخدم">
                            </div>
                            <div class="form-group">
                                <label>البريد الإلكتروني</label>
                                <input type="email" id="reg-email" required placeholder="example@mail.com">
                            </div>
                            <div class="form-group">
                                <label>كلمة المرور</label>
                                <input type="password" id="reg-password" required placeholder="أدخل كلمة مرور قوية">
                            </div>
                            <div class="form-group">
                                <label>نوع الحساب:</label>
                                <div style="display:flex;gap:2rem;justify-content:center;margin-top:0.75rem;">
                                    <label style="color:#fff;cursor:pointer;"><input type="radio" name="reg-role" value="student" checked> &nbsp;طالب</label>
                                    <label style="color:#fff;cursor:pointer;"><input type="radio" name="reg-role" value="teacher"> &nbsp;معلم</label>
                                </div>
                            </div>
                            <button type="submit" class="btn main-btn">إنشاء الحساب</button>
                        </form>
                        <div class="auth-links">
                            <span>لديك حساب بالفعل؟ <a href="#" onclick="document.getElementById('registerModal').remove();showLoginModal('student');">سجل دخول</a></span>
                        </div>
                        <div id="modalRegisterMessage" class="message-box"></div>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);

            document.getElementById('modalRegisterForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                const fullName = document.getElementById('reg-fullname').value;
                const username = document.getElementById('reg-username').value;
                const email = document.getElementById('reg-email').value;
                const password = document.getElementById('reg-password').value;
                const role = document.querySelector('input[name="reg-role"]:checked').value;

                const msg = document.getElementById('modalRegisterMessage');
                try {
                    const res = await fetch('/api/users/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ full_name: fullName, username, email, password, user_type: role })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        msg.textContent = 'تم إنشاء الحساب بنجاح! جاري التحويل لتسجيل الدخول...';
                        msg.className = 'message-box success';
                        msg.style.display = 'block';
                        setTimeout(() => {
                            document.getElementById('registerModal').remove();
                            showLoginModal(role);
                        }, 1500);
                    } else {
                        msg.textContent = data.error || 'فشل إنشاء الحساب';
                        msg.className = 'message-box error';
                        msg.style.display = 'block';
                    }
                } catch (err) {
                    msg.textContent = 'حدث خطأ في الاتصال بالخادم';
                    msg.className = 'message-box error';
                    msg.style.display = 'block';
                }
            });
        }

        // Show login modal for student
        function enterAsStudent() {
            showLoginModal('student');
        }

        function enterAsTeacher() {
            showLoginModal('teacher');
        }

        // Inject login modal HTML
        function showLoginModal(role) {
            if (document.getElementById('loginModal')) return;
            const modal = document.createElement('div');
            modal.id = 'loginModal';
            const roleTitle = role === 'student' ? 'طالب' : 'معلم';
            modal.innerHTML = `
                <div class="modal-overlay">
                    <div class="auth-card">
                        <button onclick="document.getElementById('loginModal').remove()" style="position:absolute;left:16px;top:16px;background:none;border:none;font-size:1.5rem;cursor:pointer;">&times;</button>
                        <h2><i class='fas fa-sign-in-alt'></i> تسجيل دخول ${roleTitle}</h2>
                        <form id="modalLoginForm">
                            <input type="hidden" name="role" value="${role}">
                            <div class="form-group">
                                <label for="modal-login-username">اسم المستخدم أو البريد الإلكتروني</label>
                                <input type="text" id="modal-login-username" name="username" required>
                            </div>
                            <div class="form-group">
                                <label for="modal-login-password">كلمة المرور</label>
                                <input type="password" id="modal-login-password" name="password" required>
                            </div>
                            <button type="submit" class="btn main-btn">دخول</button>
                        </form>
                        <div class="auth-links">
                            <span>ليس لديك حساب؟ <a href="register.html">سجل الآن</a></span>
                        </div>
                        <div id="modalLoginMessage" class="message-box"></div>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);

            document.getElementById('modalLoginForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                const username = document.getElementById('modal-login-username').value;
                const password = document.getElementById('modal-login-password').value;
                const roleValue = document.querySelector('#loginModal input[name="role"]').value;
                try {
                    const res = await fetch('/api/users/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password, role: roleValue })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        showModalToast('تم تسجيل الدخول بنجاح!', 'success');
                        
                        // ✅ FIX: Save ALL user data to localStorage
                        localStorage.setItem('userRole', roleValue);
                        localStorage.setItem('userId', String(data.user.id));
                        localStorage.setItem('username', data.user.username);
                        localStorage.setItem('fullName', data.user.full_name || data.user.username);
                        
                        setTimeout(() => {
                            document.getElementById('loginModal').remove();
                            if (roleValue === 'teacher') {
                                window.location.href = 'teacher.html';
                            } else {
                                window.location.href = 'student.html';
                            }
                        }, 1000);
                    } else {
                        showModalToast(data.error || 'فشل تسجيل الدخول', 'error');
                    }
                } catch (err) {
                    showModalToast('حدث خطأ في الاتصال بالخادم', 'error');
                }
            });

            function showModalToast(message, type) {
                const msg = document.getElementById('modalLoginMessage');
                msg.textContent = message;
                msg.className = 'message-box ' + (type === 'success' ? 'success' : 'error');
                msg.style.display = 'block';
            }
        }
    </script>
</body>
</html>
