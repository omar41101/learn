            // Extract data from exercise object
            const items = exercise.items || (exercise.data && exercise.data.items) || [];
            const colors = exercise.colors || (exercise.data && exercise.data.colors) || {};

            if (!items || !Array.isArray(items) || items.length === 0) {
                console.error('❌ Error: No items found in color_categorize exercise', exercise);
                const errorDiv = document.createElement('div');
                errorDiv.className = 'exercise-area';
                errorDiv.innerHTML = '<p style="color: red;">خطأ: لا توجد عناصر في التمرين</p>';
                document.getElementById('exerciseArea').appendChild(errorDiv);
                return;
            }

            // Create items grid
            const itemsDiv = document.createElement('div');
            itemsDiv.className = 'color-items-grid';

            const itemColorMap = {};

            items.forEach((item, index) => {
                const itemBtn = document.createElement('button');
                itemBtn.className = 'color-item-btn';
                itemBtn.textContent = item.name;
                itemBtn.dataset.index = index;
                itemBtn.dataset.color = 'none';
                itemBtn.style.backgroundColor = '#fff';
                itemBtn.style.border = '2px solid #ccc';

                itemBtn.addEventListener('click', function() {
                    const currentColor = this.dataset.color;
                    const itemIndex = parseInt(this.dataset.index);
                    const colorKeys = Object.keys(colors);
                    
                    if (colorKeys.length === 0) return;
                    
                    // Find current position in color cycle
                    let currentIndex = -1;
                    if (currentColor !== 'none') {
                        currentIndex = colorKeys.indexOf(currentColor);
                    }
                    
                    // Move to next color
                    const nextIndex = (currentIndex + 1) % (colorKeys.length + 1);
                    
                    if (nextIndex === colorKeys.length) {
                        // Reset to no color
                        this.dataset.color = 'none';
                        this.style.backgroundColor = '#fff';
                        this.style.border = '2px solid #ccc';
                        this.style.color = '#333';
                        delete itemColorMap[itemIndex];
                    } else {
                        // Apply next color
                        const nextColorKey = colorKeys[nextIndex];
                        const nextColor = colors[nextColorKey];
                        this.dataset.color = nextColorKey;
                        this.style.backgroundColor = nextColor;
                        this.style.border = `2px solid ${nextColor}`;
                        this.style.color = '#fff';
                        itemColorMap[itemIndex] = nextColorKey;
                    }
                });

                itemsDiv.appendChild(itemBtn);
            });

            // Create color legend
            const legendDiv = document.createElement('div');
            legendDiv.className = 'color-legend';
            legendDiv.innerHTML = '<h4>الفئات:</h4>';

            const legendItems = document.createElement('div');
            legendItems.className = 'legend-items';

            Object.entries(colors).forEach(([categoryName, colorCode]) => {
                const legendItem = document.createElement('div');
                legendItem.className = 'legend-item';
                legendItem.innerHTML = `
                    <div class="legend-color" style="background-color: ${colorCode};"></div>
                    <span>${categoryName}</span>
                `;
                legendItems.appendChild(legendItem);
            });

            legendDiv.appendChild(legendItems);

            container.appendChild(itemsDiv);
            container.appendChild(legendDiv);
            document.getElementById('exerciseArea').appendChild(container);

            // Save user answer
            const checkAnswerOriginal = window.checkAnswer;
            userAnswers[currentExerciseIndex] = itemColorMap;
        }
        
        /*****************************************************************
         * التحقق من الإجابة
         *****************************************************************/
        function checkAnswer() {
            // stop timer when checking answer
            stopQuestionTimer();
            const exercise = exercises[currentExerciseIndex];
            const userAnswer = userAnswers[currentExerciseIndex];
            const feedbackArea = document.getElementById('feedbackArea');
            
            if (userAnswer === undefined || userAnswer === null) {
                showMessage('يرجى الإجابة على السؤال أولاً', 'warning');
                return;
            }
            
            let isCorrect = false;
            let points = 10;
            
            // التحقق بناءً على نوع التمرين
            switch(exercise.exercise_type) {
                case 'multiple-choice':
                case 'multiple_choice': {
                    // Handle both simple and complex questions format
                    const questions = exercise.questions || (exercise.data && exercise.data.questions) || [];
                    const dataCorrectAnswers =
                        (exercise.data && exercise.data.correctAnswers) || exercise.correctAnswers;

                    // Complex questions array format (أسئلة فرعية)
                    if (questions.length > 0) {
                        isCorrect = true;
                        for (let i = 0; i < questions.length; i++) {
                            const userAns = userAnswer[i];
                            const q = questions[i];
                            const qCorrect = q.correctAnswers || q.correctAnswer;

                            if (Array.isArray(qCorrect)) {
                                // سؤال فرعي بعدة إجابات صحيحة: قارن كمجموعات
                                const userArr = Array.isArray(userAns) ? userAns.slice().sort() : [];
                                const correctArr = qCorrect.slice().sort();
                                if (userArr.length !== correctArr.length ||
                                    !userArr.every((v, idx) => v === correctArr[idx])) {
                                    isCorrect = false;
                                    break;
                                }
                            } else {
                                if (userAns !== qCorrect) {
                                    isCorrect = false;
                                    break;
                                }
                            }
                        }
                    } else {
                        // Simple options format
                        if (Array.isArray(dataCorrectAnswers)) {
                            // عدة إجابات صحيحة
                            const userArr = Array.isArray(userAnswer) ? userAnswer.slice().sort() : [];
                            const correctArr = dataCorrectAnswers.slice().sort();
                            isCorrect =
                                userArr.length === correctArr.length &&
                                userArr.every((v, idx) => v === correctArr[idx]);
                        } else {
                            isCorrect = (userAnswer === exercise.correctAnswer);
                        }
                    }
                    break;
                }
                    
                case 'drag-drop':
                    isCorrect = checkDragDropAnswer(exercise, userAnswer);
                    break;
                    
                case 'matching':
                    isCorrect = checkMatchingAnswer(exercise, userAnswer);
                    break;

                case 'coloring':
                    // userAnswer is expected to be an object mapping partId -> paletteIndex
                    isCorrect = true;
                    if (!userAnswer || typeof userAnswer !== 'object') {
                        isCorrect = false;
                    } else {
                        const correctMap = exercise.correctAnswer || {};
                        const parts = Object.keys(correctMap);
                        for (let p of parts) {
                            if (userAnswer[p] === undefined || userAnswer[p] !== correctMap[p]) {
                                isCorrect = false;
                                break;
                            }
                        }
                    }
                    break;

                case 'color_categorize':
                    // userAnswer is expected to be an object mapping itemIndex -> categoryName
                    isCorrect = true;
                    if (!userAnswer || typeof userAnswer !== 'object') {
                        isCorrect = false;
                    } else {
                        const items = exercise.items || (exercise.data && exercise.data.items) || [];
                        const colors = exercise.colors || (exercise.data && exercise.data.colors) || {};
                        for (let i = 0; i < items.length; i++) {
                            const expectedColorCode = items[i].correctColor;  // e.g., "#e74c3c"
                            const userCategoryName = userAnswer[i];  // e.g., "حية"
                            
                            if (!userCategoryName) {
                                isCorrect = false;
                                break;
                            }
                            
                            // Get the color code for the user's selected category
                            const selectedColorCode = colors[userCategoryName];
                            
                            if (selectedColorCode !== expectedColorCode) {
                                isCorrect = false;
                                break;
                            }
                        }
                    }
                    break;
                    
                case 'selection':
                    isCorrect = checkSelectionAnswer(exercise, userAnswer);
                    break;
            }
            
            // 💾 حفظ النتيجة في قاعدة البيانات
            const attempts = userAttempts[currentExerciseIndex] || 0;
            saveExerciseResult(exercise.id, currentLevel, isCorrect ? 10 : 0, isCorrect, userAnswer, attempts);
            
            // عرض النتيجة
            if (isCorrect) {
                const exId = exercise.id;
                
                // تحقق مما إذا كانت الإجابة على هذا التمرين قد سُجلت سابقاً
                if (!currentCompletedExercises.includes(exId)) {
                    // أول مرة إتمام هذا التمرين -> منح نقاط
                    currentCompletedExercises.push(exId);

                    feedbackArea.innerHTML = `
                        <div class="feedback correct">
                            <i class="fas fa-check-circle"></i>
                            <div>
                                <h4>أحسنت! 🎉</h4>
                                <p>الإجابة صحيحة! ${isDiagnosis ? '' : `لقد ربحت ${points} نقطة`}</p>
                            </div>
                        </div>
                    `;

                    // إضافة النقاط (حتى في وضع التشخيص لنتمكن من إرسال النتيجة الصحيحة في النهاية)
                    currentScore += points;
                    document.getElementById('scoreValue').textContent = currentScore;

                    // حفظ النقاط وقائمة التمارين المكتملة في localStorage
                    saveScore(currentLevel, currentScore);
                    saveCompletedExercises(currentLevel, currentCompletedExercises);
                    
                    // 📊 تحديث التقدم في قاعدة البيانات (فقط في الوضع العادي، التشخيص يتم إرساله دفعة واحدة في النهاية)
                    if (!isDiagnosis) {
                        updateLevelProgress(currentLevel, currentScore, false);
                    }
                } else {
                    // سبق وأن أتم المستخدم هذا التمرين -> لا تُمنح نقاط إضافية
                    feedbackArea.innerHTML = `
                        <div class="feedback correct">
                            <i class="fas fa-check-circle"></i>
                            <div>
                                <h4>صحيح ✅</h4>
                                <p>لقد أكملت هذا السؤال سابقاً، لن تحصل على نقاط إضافية.</p>
                            </div>
                        </div>
                    `;
                }

                // تحديث جميع عناصر العرض المتعلقة بالنقاط (شاملة ونقاط المستوى)
                updateScoreDisplays();

            } else {
                feedbackArea.innerHTML = `
                        <div class="feedback incorrect">
                            <i class="fas fa-times-circle"></i>
                            <div>
                                <h4>حاول مرة أخرى! 💪</h4>
                                <p>${exercise.hint || 'فكر جيداً في الإجابة'}</p>
                                <button class="btn" style="margin-top: 10px; background: #6366f1; color: white;" onclick="askAIExplanation()">
                                    <i class="fas fa-lightbulb"></i> اسأل الذكاء الاصطناعي لماذا؟
                                </button>
                            </div>
                        </div>
                    `;

                // إزالة أي تمييزات 'صحيحة' عامة حتى لا تظهر الإجابات باللون الأخضر عند الخطأ
                document.querySelectorAll('.choice-option.selected').forEach(el => el.classList.remove('selected'));
                document.querySelectorAll('.matching-item.matched').forEach(el => el.classList.remove('matched'));
                document.querySelectorAll('.correct').forEach(el => el.classList.remove('correct'));

                // بدلاً من مسح الإجابات السابقة، نُظهر للمستخدم العناصر الخاطئة حتى يتمكن من تعديلها
                // إزالة أي تمييزات "صحيحة" من العناصر الخاطئة وإضافة تمييز خاطئ واضح
                if (exercise.type === 'drag-drop') {
                    document.querySelectorAll('.drop-zone').forEach(zone => {
                        const content = zone.querySelector('.zone-content');
                        const dropped = content && content.querySelector('.dropped-item');
                        if (dropped) {
                            const itemName = dropped.textContent;
                            const itemObj = exercise.items.find(it => it.name === itemName);
                            const zoneCat = content.dataset.category;
                            if (!itemObj || itemObj.correctCategory !== zoneCat) {
                                dropped.classList.remove('matched');
                                dropped.classList.add('incorrect');
                            } else {
                                dropped.classList.remove('incorrect');
                                dropped.classList.add('matched');
                            }
                        }
                    });
                }

                if (exercise.type === 'multiple-choice') {
                    // اضبط حالة الخيارات: اجعل الخيار المختار غير محدد باللون الأخضر إذا كان خاطئاً
                    document.querySelectorAll('.choice-option').forEach(opt => {
                        opt.classList.remove('incorrect');
                        opt.classList.remove('correct');
                    });
                    const selected = document.querySelector('.choice-option.selected');
                    if (selected) {
                        const selIndex = parseInt(selected.dataset.index);
                        if (selIndex !== exercise.correctAnswer) {
                            selected.classList.remove('selected');
                            selected.classList.add('incorrect');
                        } else {
                            selected.classList.add('correct');
                        }
                    }
                }

                if (exercise.type === 'matching') {
                    // احذف تمييز المطابقات الخاطئة
                    const sel = userAnswers[currentExerciseIndex];
                    if (sel && sel.selected) {
                        const animalEl = document.querySelector(`[data-animal="${sel.selected}"]`);
                        const movementEl = Array.from(document.querySelectorAll('.matching-item[data-movement]')).find(m => m.dataset.movement === sel.matched);
                        const pairs = exercise.pairs || (exercise.data && exercise.data.pairs);
                        if (animalEl && movementEl) {
                            const correctPair = pairs.find(p => p.animal === sel.selected);
                            if (!correctPair || correctPair.movement !== sel.matched) {
                                animalEl.classList.remove('matched');
                                movementEl.classList.remove('matched');
                                animalEl.classList.add('incorrect');
                                movementEl.classList.add('incorrect');
                            } else {
                                animalEl.classList.remove('incorrect');
                                movementEl.classList.remove('incorrect');
                                animalEl.classList.add('matched');
                                movementEl.classList.add('matched');
                            }
                        }
                    }
                }

                if (exercise.type === 'selection') {
                    // أزل تمييزات الصحيحة وأضف تمييز خاطئ للأزرار المختارة الخاطئة
                    document.querySelectorAll('.sense-btn').forEach(b => b.classList.remove('incorrect'));
                    const wrongBtns = [];
                    const correctMatches = exercise.correctMatches || [];
                    const answers = userAnswers[currentExerciseIndex] || {};
                    for (let i = 0; i < correctMatches.length; i++) {
                        if (answers[i] !== undefined && answers[i] !== correctMatches[i]) {
                            // تمييز الزر المختار كخاطئ
                            const btn = document.querySelector(`.sense-btn[data-image="${i}"][data-sense="${answers[i]}"]`);
                            if (btn) btn.classList.add('incorrect');
                        }
                    }
                }

                // زيادة عدد المحاولات للمستخدم على هذا التمرين
                userAttempts[currentExerciseIndex] = (userAttempts[currentExerciseIndex] || 0) + 1;
                const attemptCount = userAttempts[currentExerciseIndex];
                // عرض رقم المحاولة للمستخدم بشكل لطيف
                const attemptNote = document.createElement('div');
                attemptNote.className = 'attempt-note';
                attemptNote.textContent = `محاولة رقم ${attemptCount} — حاول مرة أخرى`;
                feedbackArea.appendChild(attemptNote);
                // إذا كنا في وضع التشخيص، نمرر تلقائياً للسؤال التالي بعد تأخير قصير
                if (isDiagnosis) {
                    setTimeout(() => {
                        nextExercise();
                    }, 900);
                }
            }
            
            // إبقاء التحقق مفعلاً عند الخطأ، والانتقال تلقائياً عند الصحة
            document.getElementById('checkBtn').disabled = isCorrect;
            document.getElementById('nextBtn').disabled = !isCorrect;

            if (isCorrect) {
                setTimeout(() => {
                    nextExercise();
                }, 600);
            }
        }
        
        function checkDragDropAnswer(exercise, userAnswer) {
            let correctCount = 0;
            
            exercise.items.forEach(item => {
                if (userAnswer[item.name] === item.correctCategory) {
                    correctCount++;
                }
            });
            
            return correctCount === exercise.items.length;
        }
        
        function checkMatchingAnswer(exercise, userAnswer) {
            if (!userAnswer.selected || !userAnswer.matched) {
                return false;
            }
            
            const pairs = exercise.pairs || (exercise.data && exercise.data.pairs);
            const correctPair = pairs.find(p => 
                p.animal === userAnswer.selected
            );
            
            return correctPair && correctPair.movement === userAnswer.matched;
        }
        
        function checkSelectionAnswer(exercise, userAnswer) {
            const correctMatches = exercise.correctMatches || (exercise.data && exercise.data.correctMatches);
            for (let i = 0; i < correctMatches.length; i++) {
                if (userAnswer[i] !== correctMatches[i]) {
                    return false;
                }
            }
            return true;
        }

                const response = await fetch('/api/ai/hint', {

                    headers: { 'Content-Type': 'application/json' },

                        question: exercise.question,
                        context: { type: exercise.type, options: exercise.options }
                    })
                });

                if (!response.ok) throw new Error('AI Hint failed');
                const data = await response.json();

                content.textContent = data.hint;
                bubble.style.display = 'block';

                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-magic"></i> تلميح ذكي';

                showMessage('عذراً، تعذر الاتصال بالذكاء الاصطناعي', 'warning');

        async function askAIExplanation() {
            const exercise = exercises[currentExerciseIndex];
            const bubble = document.getElementById('aiBubble');
            const content = document.getElementById('aiContent');
            
            // Determine student answer text
            let studentAnswerText = "";
            let correctAnswerText = "";

            if (exercise.type === 'multiple-choice') {
                studentAnswerText = exercise.options[userAnswers[currentExerciseIndex]];
                correctAnswerText = exercise.options[exercise.correctAnswer];
            } else {
                studentAnswerText = JSON.stringify(userAnswers[currentExerciseIndex]);

            try {
                content.innerHTML = '<i class="fas fa-spinner fa-spin"></i> مساعدك يكتب التفسير...';
                bubble.style.display = 'block';

                const response = await fetch('/api/ai/explain', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        question: exercise.question,
                        studentAnswer: studentAnswerText,
                        correctAnswer: correctAnswerText
                    })

        function getCompletedLevels() {
            const stored = localStorage.getItem('completedLevels');
            let levels = [];
            if (stored) {
                try {
                    levels = JSON.parse(stored);
                } catch (e) {
                    levels = [];
                }
            }
            if (!Array.isArray(levels)) {
                levels = [];
            }
            if (!levels.includes(1)) {
                levels.push(1);
            }
            return levels;
        }

        function saveCompletedLevels(levels) {
            localStorage.setItem('completedLevels', JSON.stringify(levels));
        }

        // حفظ النقاط للمستوى في localStorage
        function saveScore(level, score) {
            try {
                localStorage.setItem(`level${level}_score`, score);
            } catch (e) {
                console.warn('تعذر حفظ النقاط:', e);
            }
        }

        // حفظ قائمة التمارين المكتملة لمستوى معين
        function saveCompletedExercises(level, completedArray) {
            try {
                localStorage.setItem(`level${level}_completed`, JSON.stringify(completedArray));
            } catch (e) {
                console.warn('تعذر حفظ تمارين المكتملة:', e);
            }
        }

        

        // احسب مجموع النقاط لجميع المستويات من localStorage
        function getTotalScore() {
            let total = 0;
            try {
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    const m = key && key.match(/^level(\d+)_score$/);
                    if (m) {
                        const val = parseInt(localStorage.getItem(key), 10) || 0;
                        total += val;
                    }
                }
            } catch (e) {
                console.warn('تعذر قراءة النقاط الكلية:', e);
            }
            return total;
        }

        // حدث لتحديث كل العناصر التي تعرض النقاط في التطبيق
        function updateScoreDisplays() {
            // تحديث رقم النقاط الحالي في رأس التمرين
            const scoreEl = document.getElementById('scoreValue');
            if (scoreEl) scoreEl.textContent = currentScore;

            // تحديث عنصر النقاط الشاملة - دعم كلا الاسمين totalscore و totalScore
            const total = getTotalScore();
            const totalStrong = document.getElementById('totalscore');
            if (totalStrong && totalStrong.parentElement) {
                totalStrong.parentElement.innerHTML = `<strong id="totalscore">${total}</strong> == $${total}`;
            }
            const totalCamel = document.getElementById('totalScore');
            if (totalCamel) {
                totalCamel.textContent = total;
            }

            // تحديث عنصر نقاط المستوى الحالي إن وُجد
            const levelScoreId = `level${currentLevel}-score`;
            const levelScoreEl = document.getElementById(levelScoreId);
            if (levelScoreEl && levelScoreEl.parentElement) {
                levelScoreEl.parentElement.innerHTML = `<span class="score" id="${levelScoreId}">النقاط: ${currentScore}</span> == $${currentScore}`;
            }
        }
